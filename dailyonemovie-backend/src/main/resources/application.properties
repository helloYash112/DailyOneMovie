spring.application.name=dailyonemovie-backend
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# PostgreSQL driver
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server port (default 8080 if not set)
server.port=${PORT:8080}

spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB

# Backblaze B2 S3-compatible settings
b2.endpoint=${B2_ENDPOINT}
b2.bucketName=${B2_BUCKET_NAME}
b2.accessKeyId=${B2_ACCESS_KEY_ID}
b2.secretAccessKey=${B2_SECRET_ACCESS_KEY}




